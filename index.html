<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタンプメーカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <header>
    <h1><span class="accent">スタンプ</span>メーカー</h1>
    <p>STAMP MAKER — 画像に文字をのせて保存できます</p>
  </header>

  <div class="card stage-card">
    <input type="file" id="file" accept="image/*" hidden>
    <button class="btn upload" id="uploadBtn">📷 画像を選ぶ</button>
    <div class="stage-wrap" style="margin-top:10px">
      <canvas id="stage" width="1024" height="1024"></canvas>
    </div>
    <p class="hint">文字・かざりはドラッグで移動 / かざりはダブルタップで削除</p>
    <div class="row" style="margin-top:8px;justify-content:center">
      <label class="toggle"><input type="checkbox" id="stampRatio">スタンプ比率 370:320</label>
      <label class="toggle"><input type="checkbox" id="guide">余白ガイド</label>
      <button class="chip" id="resetPos">位置リセット</button>
    </div>
  </div>

  <div class="card controls-card">
    <div class="section-label">あいさつプリセット</div>
    <div class="row" id="presets"></div>

    <div class="section-label">文字を入力</div>
    <div class="row">
      <input type="text" id="text" value="おはよう" maxlength="10">
    </div>

    <div class="section-label">文字のスタイル</div>
    <div class="row" style="margin-bottom:8px">
      <label class="toggle"><input type="checkbox" id="vertical" checked>たて書き</label>
      <label class="toggle"><input type="checkbox" id="split" checked>2色に分ける</label>
      <div class="ctrl">色1 <input type="color" id="colorA" value="#FF7BAC"></div>
      <div class="ctrl">色2 <input type="color" id="colorB" value="#FFC400"></div>
    </div>
    <div class="ctrl" id="splitAtCtrl" style="margin-bottom:8px">色2は <b id="splitAtVal">3</b> 文字目から <input type="range" id="splitAt" min="1" max="4" value="3"></div>
    <div class="ctrl">サイズ <input type="range" id="size" min="70" max="240" value="160"></div>

    <div class="section-label">かざり(何個でも置けます)</div>
    <div class="row">
      <button class="chip" id="addPaw">🐾 にくきゅう追加</button>
      <button class="chip" id="addSpark">✨ キラキラ追加</button>
      <button class="chip" id="clearDecos">全部消す</button>
    </div>

    <div class="section-label">背景</div>
    <div class="row">
      <label class="toggle"><input type="checkbox" id="transparent">白背景を透過</label>
      <div class="ctrl" id="bgColorCtrl">背景色 <input type="color" id="bgColor" value="#FFFFFF"></div>
    </div>
    <div class="ctrl" id="thresholdCtrl" hidden style="margin-top:8px">透過の強さ <input type="range" id="threshold" min="180" max="250" value="232"></div>

    <div class="section-label">画像の調整</div>
    <div class="ctrl">おおきさ <input type="range" id="imgScale" min="50" max="150" value="92"></div>
    <div class="ctrl">よこ位置 <input type="range" id="imgX" min="0" max="100" value="98"></div>
    <div class="ctrl">たて位置 <input type="range" id="imgY" min="0" max="100" value="50"></div>
  </div>

  <div class="card save-card">
    <div class="section-label">保存 — LINEスタンプ用(透過PNG)</div>
    <div class="btn-grid three">
      <button class="btn dl sub" id="dlStamp">スタンプ<br>370×320</button>
      <button class="btn dl sub" id="dlMain">メイン<br>240×240</button>
      <button class="btn dl sub" id="dlTab">タブ<br>96×74</button>
    </div>
    <div class="section-label">保存 — 高画質</div>
    <button class="btn dl" id="dlFull">PNGで保存(1024px)</button>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
